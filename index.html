<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reverse Geocoding - App independiente</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""/>
</head>
<body>
  <header>
    <h1>Reverse Geocoding — Fotos & POIs</h1>
    <p class="subtitle">Subí fotos, extraé coordenadas (EXIF), buscá POIs cercanos y sugerí captions.</p>
  </header>

  <main>
    <section id="controls" class="panel">
      <div class="control-row">
        <label for="consent">Usar ubicación EXIF para sugerencias:</label>
        <input id="consent" type="checkbox" checked />
        <label for="anonymize">Anonymizar al guardar (redondear coords):</label>
        <input id="anonymize" type="checkbox" />
        <label for="stripExif">Eliminar EXIF al exportar/descargar:</label>
        <input id="stripExif" type="checkbox" />
      </div>

      <div class="control-row">
        <label for="radiusRange">Radio búsqueda (m): <span id="radiusValue">500</span></label>
        <input id="radiusRange" type="range" min="50" max="5000" step="50" value="500"/>
      </div>

      <div class="control-row">
        <label for="imagesInput">Subir imágenes (con EXIF):</label>
        <input id="imagesInput" type="file" accept="image/*" multiple />
      </div>
    </section>

    <section id="content">
      <aside id="photosPane" class="panel">
        <h2>Fotos</h2>
        <div id="photosList" class="list"></div>
      </aside>

      <section id="mapPane">
        <div id="map" style="height:520px; border-radius:8px; border:1px solid #ddd;"></div>
        <div id="placeDetails" class="panel">
          <h3>Detalles</h3>
          <div id="selectedInfo">Seleccioná una foto con coordenadas.</div>
          <div id="placesList"></div>
        </div>
      </section>
    </section>
  </main>

  <footer class="panel">
    <small>App independiente — en producción guardá la API Key en variables de entorno del backend (Vercel).</small>
  </footer>

  <!-- Exifr para EXIF -->
  <script src="https://unpkg.com/exifr/dist/full.umd.js"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
